<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Debug Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e0f11; color: #e8e4d8; font-family: 'Courier New', monospace; padding: 20px; max-width: 700px; margin: 0 auto; }
h1 { color: #f0c060; margin-bottom: 16px; font-size: 1.1rem; }
input { background: #22262e; border: 1px solid #3a3d45; border-radius: 4px; padding: 10px 12px; color: #e8e4d8; font-family: monospace; font-size: 0.78rem; width: 100%; margin-bottom: 10px; }
button { background: #f0c060; color: #0e0f11; border: none; border-radius: 4px; padding: 10px 20px; font-weight: 700; font-family: monospace; font-size: 0.7rem; cursor: pointer; margin-right: 8px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
button:disabled { opacity: 0.4; }
pre { background: #16181c; border: 1px solid #2a2d35; border-radius: 6px; padding: 14px; font-size: 0.62rem; line-height: 1.6; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; margin-top: 12px; color: #8a8070; }
.ok { color: #50c878; }
.err { color: #e04040; }
.gold { color: #f0c060; }
.section { margin-top: 20px; }
.slabel { font-size: 0.6rem; color: #8a8070; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
img.test-img { max-width: 200px; max-height: 200px; object-fit: contain; border: 1px solid #3a3d45; border-radius: 4px; margin-top: 8px; display: block; }
</style>
</head>
<body>
<h1>HEIMLAGER — API Debug</h1>

<input type="password" id="key" placeholder="sk-ant-api03-…">

<div>
  <button onclick="test1()">1. Test API key (no tools)</button>
  <button onclick="test2()">2. Test web_search tool</button>
  <button onclick="test3()">3. Search Sagrotan image URL</button>
  <button onclick="test4()">4. Test weserv proxy with known URL</button>
</div>

<div class="section">
  <div class="slabel">Raw API Response</div>
  <pre id="out">Click a test button above…</pre>
</div>

<div class="section" id="img-section" style="display:none">
  <div class="slabel">Image Result</div>
  <div id="img-out"></div>
</div>

<script>
const out = t => document.getElementById('out').innerHTML = t;
const key = () => document.getElementById('key').value.trim();

async function callAPI(body) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)
  });
  const status = r.status;
  const data = await r.json();
  return { status, data };
}

// Test 1: Basic API call - no tools
async function test1() {
  if (!key().startsWith('sk-ant-')) { alert('Enter API key first'); return; }
  out('Calling API (no tools)…');
  try {
    const { status, data } = await callAPI({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 100,
      messages: [{ role: 'user', content: 'Say: API_WORKS' }]
    });
    const text = (data.content||[]).map(b=>b.text||'').join('');
    out(`<span class="${status===200?'ok':'err'}">HTTP ${status}</span>\n\nResponse text: <span class="gold">${text}</span>\n\nFull response:\n${JSON.stringify(data, null, 2)}`);
  } catch(e) {
    out(`<span class="err">Error: ${e.message}</span>`);
  }
}

// Test 2: web_search tool - simple search
async function test2() {
  if (!key().startsWith('sk-ant-')) { alert('Enter API key first'); return; }
  out('Calling API with web_search tool…');
  try {
    const { status, data } = await callAPI({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 300,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: 'Search the web for: what is the capital of Germany. Give me the answer.' }]
    });
    const blocks = data.content || [];
    const textBlocks = blocks.filter(b=>b.type==='text').map(b=>b.text);
    const toolBlocks = blocks.filter(b=>b.type==='tool_use');
    const searchBlocks = blocks.filter(b=>b.type==='web_search_result');
    out(`<span class="${status===200?'ok':'err'}">HTTP ${status}</span>  stop_reason: <span class="gold">${data.stop_reason}</span>\n\nContent blocks: ${blocks.length} total\n- text blocks: ${textBlocks.length}\n- tool_use blocks: ${toolBlocks.length}  \n- web_search_result blocks: ${searchBlocks.length}\n\nText response: <span class="gold">${textBlocks.join(' ').slice(0,200)}</span>\n\nFull:\n${JSON.stringify(data, null, 2)}`);
  } catch(e) {
    out(`<span class="err">Error: ${e.message}</span>`);
  }
}

// Test 3: Search for Sagrotan image URL
async function test3() {
  if (!key().startsWith('sk-ant-')) { alert('Enter API key first'); return; }
  out('Searching for Sagrotan image URL…');
  try {
    const { status, data } = await callAPI({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 400,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: 
        'Search for "Sagrotan 2in1 Allzweck Bodenreiniger" on the web.\n' +
        'Find a direct product image URL ending in .jpg, .jpeg, .png, or .webp.\n' +
        'Any source is fine: amazon.de, dm.de, manufacturer site, anywhere.\n' +
        'Reply with ONLY the image URL. Nothing else.'
      }]
    });
    const blocks = data.content || [];
    const text = blocks.filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    const m = text.match(/https?:\/\/[^\s"'\n<>()\[\],]+/i);
    const imgUrl = m ? m[0].replace(/[.,;)>\]"']+$/,'') : '';

    out(`HTTP ${status}  stop_reason: ${data.stop_reason}\n\nClaude text response:\n<span class="gold">${text||'(empty)'}</span>\n\nExtracted URL: <span class="${imgUrl?'ok':'err'}">${imgUrl||'NONE'}</span>\n\nAll content blocks:\n${JSON.stringify(blocks.map(b=>({type:b.type,text:b.text?.slice(0,100)})), null, 2)}`);

    if (imgUrl) {
      document.getElementById('img-section').style.display = 'block';
      const proxied = 'https://images.weserv.nl/?url=' + encodeURIComponent(imgUrl) + '&w=300&output=webp&we';
      document.getElementById('img-out').innerHTML = `
        <div style="font-size:.6rem;color:#8a8070;margin-bottom:6px">Raw URL: ${imgUrl}</div>
        <div style="font-size:.6rem;color:#8a8070;margin-bottom:6px">Proxied: ${proxied.slice(0,80)}…</div>
        <div style="font-size:.6rem;color:#f0c060;margin-bottom:6px">Loading via weserv proxy…</div>
        <img class="test-img" id="result-img" src="${proxied}">
      `;
      document.getElementById('result-img').onload = () => {
        document.querySelector('.gold').textContent = '';
        document.getElementById('img-out').querySelector('.gold').style.color = '#50c878';
        document.getElementById('img-out').querySelector('.gold').textContent = '✓ Image loaded successfully!';
      };
      document.getElementById('result-img').onerror = () => {
        document.getElementById('img-out').querySelector('.gold').style.color = '#e04040';
        document.getElementById('img-out').querySelector('.gold').textContent = '✗ weserv proxy failed — trying direct…';
        const direct = document.getElementById('result-img');
        direct.src = imgUrl;
      };
    }
  } catch(e) {
    out(`<span class="err">Error: ${e.message}</span>`);
  }
}

// Test 4: weserv proxy with a known working image URL
async function test4() {
  out('Testing weserv.nl proxy with a known Amazon image URL…');
  document.getElementById('img-section').style.display = 'block';

  const testUrls = [
    // Known Amazon product image (Sagrotan)
    'https://m.media-amazon.com/images/I/71T3vfJdriL._AC_SL1500_.jpg',
    // dm.de static image CDN
    'https://media.dm-static.com/images/f_auto,q_auto,c_fit,h_440/v1/products/4002448112695/4002448112695',
    // Manufacturer / Reckitt website
    'https://www.sagrotan.de/content/dam/rbhe/sagrotan/germany/images/products/allzweck-reiniger.png',
  ];

  let html = '';
  for (const url of testUrls) {
    const proxied = 'https://images.weserv.nl/?url=' + encodeURIComponent(url) + '&w=200&output=webp&we';
    const id = 'img-' + Math.random().toString(36).slice(2);
    html += `
      <div style="margin-bottom:16px">
        <div style="font-size:.55rem;color:#4a4840;margin-bottom:4px;word-break:break-all">${url}</div>
        <div style="display:flex;gap:8px;align-items:flex-start">
          <div>
            <div style="font-size:.5rem;color:#8a8070;margin-bottom:3px">DIRECT</div>
            <img id="d-${id}" src="${url}" style="width:80px;height:80px;object-fit:contain;border:1px solid #2a2d35;border-radius:4px;background:#22262e">
          </div>
          <div>
            <div style="font-size:.5rem;color:#8a8070;margin-bottom:3px">WESERV PROXY</div>
            <img id="p-${id}" src="${proxied}" style="width:80px;height:80px;object-fit:contain;border:1px solid #2a2d35;border-radius:4px;background:#22262e">
          </div>
          <div id="s-${id}" style="font-size:.55rem;color:#4a4840;padding-top:24px">testing…</div>
        </div>
      </div>
    `;
  }
  document.getElementById('img-out').innerHTML = html;
  out('Testing direct load vs weserv proxy for 3 known URLs.\nGreen border = loaded OK, red = blocked.\nSee Image Result section below.');

  // Set up load/error handlers
  for (const url of testUrls) {
    // We can't easily get the id back, so just use all imgs
  }
  document.querySelectorAll('#img-out img').forEach(img => {
    img.onload = () => { img.style.borderColor = '#50c878'; };
    img.onerror = () => { img.style.borderColor = '#e04040'; img.style.opacity = '0.3'; };
  });
}
</script>
</body>
</html>
